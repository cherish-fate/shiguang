        '422':
          $ref: '#/components/responses/ValidationFailed'

  /capsule/create:
    post:
      tags: [Capsule]
      summary: 鍒涘缓鑳跺泭
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCapsuleRequest'
      responses:
        '200':
          description: 鍒涘缓鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapsuleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /capsule/list:
    get:
      tags: [Capsule]
      summary: 鑾峰彇鑳跺泭鍒楄〃
      security: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/campusQuery'
        - $ref: '#/components/parameters/moodQuery'
        - $ref: '#/components/parameters/timeRange'
        - $ref: '#/components/parameters/keyword'
      responses:
        '200':
          description: 鑾峰彇鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapsuleListApiResponse'

  /capsule/detail:
    get:
      tags: [Capsule]
      summary: 鑾峰彇鑳跺泭璇︽儏
      security: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 鑾峰彇鎴愬姛
          content:
            application/json:
              schema:
