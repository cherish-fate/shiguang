  /capsule/delete:
    delete:
      tags: [Capsule]
      summary: 鍒犻櫎鑳跺泭
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRequest'
      responses:
        '200':
          $ref: '#/components/responses/SimpleSuccess'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /capsule/batch:
    post:
      tags: [Capsule]
      summary: 鎵归噺鎿嶄綔鑳跺泭
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
      responses:
        '200':
          $ref: '#/components/responses/SimpleSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /capsule/my:
    get:
      tags: [Capsule]
      summary: 鑾峰彇鎴戠殑鑳跺泭
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/campusQuery'
        - $ref: '#/components/parameters/timeRange'
      responses:
        '200':
          description: 鑾峰彇鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapsuleListApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /capsule/export:
    post:
      tags: [Capsule]
      summary: 瀵煎嚭鑳跺泭鍗＄墖
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: 瀵煎嚭鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /capsule/location/bind:
    post:
      tags: [Capsule]
      summary: 缁戝畾鍦扮偣淇℃伅
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindLocationRequest'
      responses:
        '200':
          description: 缁戝畾鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindLocationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /capsule/reply:
    post:
      tags: [Capsule]
      summary: 鍥炲鑳跺泭
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplyRequest'
      responses:
        '200':
          $ref: '#/components/responses/SimpleSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /capsule/replies:
    get:
      tags: [Capsule]
      summary: 鑾峰彇鍥炲鍒楄〃
      security: []
      parameters:
        - name: capsuleId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: 鑾峰彇鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepliesApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /map/capsules:
    get:
      tags: [Map]
      summary: 鑾峰彇鍦板浘鑳跺泭鐐?      security: []
      parameters:
        - $ref: '#/components/parameters/campusRequired'
        - $ref: '#/components/parameters/timeRangeRequired'
      responses:
        '200':
          description: 鑾峰彇鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapCapsulesResponse'

  /map/stats:
    get:
      tags: [Map]
      summary: 鑾峰彇鏍″尯鎯呯华缁熻
      security: []
      parameters:
        - $ref: '#/components/parameters/campusRequired'
        - $ref: '#/components/parameters/timeRangeRequired'
      responses:
        '200':
          description: 鑾峰彇鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapStatsApiResponse'

  /ai/narrative:
    post:
      tags: [AI]
      summary: AI 鍙欎簨鐢熸垚
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NarrativeRequest'
      responses:
        '200':
          description: 鐢熸垚鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NarrativeApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /ai/emotion:
    post:
      tags: [AI]
      summary: AI 鎯呯华鍒嗘瀽
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmotionRequest'
      responses:
        '200':
          description: 鍒嗘瀽鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmotionApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /ai/rewrite:
    post:
      tags: [AI]
      summary: AI 鏂囧瓧娑﹁壊
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RewriteRequest'
      responses:
        '200':
          description: 娑﹁壊鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RewriteApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /ai/voice/optimize:
    post:
      tags: [AI]
      summary: AI 璇煶杞啓浼樺寲
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceOptimizeRequest'
      responses:
        '200':
          description: 浼樺寲鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceOptimizeApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /ai/code/format:
    post:
      tags: [AI]
      summary: AI 浠ｇ爜缇庡寲
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeFormatRequest'
      responses:
        '200':
          description: 鏍煎紡鍖栨垚鍔?          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeFormatApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /file/upload:
    post:
      tags: [File]
      summary: 濯掍綋鏂囦欢涓婁紶
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 涓婁紶鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    avatar:
      name: avatar
      in: query
      schema:
        type: string
    nickname:
      name: nickname
      in: query
      required: true
      schema:
        type: string
    grade:
      name: grade
      in: query
      required: true
      schema:
        type: string
    college:
      name: college
      in: query
      required: true
      schema:
        type: string
    phone:
      name: phone
      in: query
      required: true
      schema:
        type: string
    code:
      name: code
      in: query
      required: true
      schema:
        type: string
    password:
      name: password
      in: query
      required: true
      schema:
        type: string
    agreeProtocol:
      name: agreeProtocol
      in: query
      required: true
      schema:
        type: boolean
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
    campusQuery:
      name: campus
      in: query
      schema:
        type: string
        enum: [ml, jm]
    moodQuery:
      name: mood
      in: query
      schema:
        type: string
    timeRange:
      name: timeRange
      in: query
      schema:
        type: integer
        default: 24
    keyword:
      name: keyword
      in: query
      schema:
        type: string
    campusRequired:
      name: campus
      in: query
      required: true
      schema:
        type: string
        enum: [ml, jm]
    timeRangeRequired:
      name: timeRange
      in: query
      required: true
      schema:
        type: integer
  responses:
    SimpleSuccess:
      description: 鎴愬姛
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NullResponse'
    BadRequest:
      description: 璇锋眰閿欒
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NullResponse'
    Unauthorized:
      description: 鏈櫥褰曟垨 Token 缂哄け
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NullResponse'
    Forbidden:
      description: Token 澶辨晥鎴栨棤鏉冮檺
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NullResponse'
    NotFound:
      description: 璧勬簮涓嶅瓨鍦?      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NullResponse'
    ValidationFailed:
      description: 鍙傛暟鏍￠獙澶辫触
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationResponse'
    TooManyRequests:
      description: 璇锋眰杩囦簬棰戠箒
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NullResponse'
    PayloadTooLarge:
      description: 鏂囦欢澶у皬瓒呴檺
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NullResponse'
    UnsupportedMediaType:
      description: 鏂囦欢绫诲瀷涓嶆敮鎸?      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NullResponse'
    InternalError:
      description: 鏈嶅姟鍣ㄥ唴閮ㄩ敊璇?      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NullResponse'
  schemas:
    BaseResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string
    NullResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              nullable: true
    ValidationResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: object
              additionalProperties:
                type: string
