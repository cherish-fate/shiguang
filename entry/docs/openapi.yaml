openapi: 3.0.3
info:
  title: sgyj_background API
  version: 1.2.0
  description: |
    拾光印记后端接口文档。
    本文档可直接导入 Apifox，包含原有接口与新增功能接口。
    坐标字段统一使用 `latitude` 和 `longitude`，类型为 `double`，采用 WGS84 十进制度。
    例如北纬 `34°48'55"` 可写为 `34.815278`，东经 `114°18'08"` 可写为 `114.302222`。
servers:
  - url: http://127.0.0.1:3000
    description: Local dev
tags:
  - name: Health
  - name: Agreement
  - name: SMS
  - name: User
  - name: Capsule
  - name: Map
  - name: AI
  - name: File
security:
  - bearerAuth: []
paths:
  /:
    get:
      tags: [Health]
      summary: 鏈嶅姟棣栭〉
      security: []
      responses:
        '200':
          description: 鏈嶅姟杩愯涓?          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexResponse'
  /health:
    get:
      tags: [Health]
      summary: 鍋ュ悍妫€鏌?      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /db/probe:
    get:
      tags: [Health]
      summary: 鏁版嵁搴撴帰閽?      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'

  /agreement/content:
    get:
      tags: [Agreement]
      summary: 鑾峰彇鐢ㄦ埛鍗忚涓庨殣绉佹斂绛?      security: []
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
          description: agreement銆乸rivacy 鎴?agreement,privacy
          example: agreement,privacy
      responses:
        '200':
          description: 鑾峰彇鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementContentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /sms/sendCode:
    post:
      tags: [SMS]
      summary: 鍙戦€佺煭淇￠獙璇佺爜
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendCodeRequest'
      responses:
        '200':
          $ref: '#/components/responses/SimpleSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /user/register:
    get:
      tags: [User]
      summary: 鐢ㄦ埛娉ㄥ唽锛圙ET 鍏煎锛?      security: []
      parameters:
        - $ref: '#/components/parameters/avatar'
        - $ref: '#/components/parameters/nickname'
        - $ref: '#/components/parameters/grade'
        - $ref: '#/components/parameters/college'
        - $ref: '#/components/parameters/phone'
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/password'
        - $ref: '#/components/parameters/agreeProtocol'
      responses:
        '200':
          description: 娉ㄥ唽鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    post:
      tags: [User]
      summary: 鐢ㄦ埛娉ㄥ唽
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 娉ㄥ唽鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /user/login:
    post:
      tags: [User]
      summary: 鐢ㄦ埛鐧诲綍
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 鐧诲綍鎴愬姛
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /user/login/harmony:
