openapi: 3.0.3
info:
  title: Timeprint PC Connect Flow API
  version: 1.0.0
  description: |
    用于 FoxApi / Apifox 导入测试的 PC Connect 新增接口文档。

    设计目标：
    1. 不改动已有 `/pc/connect/request`、`/pc/connect/confirm`
    2. 新增“同账号手机连接 PC / PC 连接手机”的配对流程
    3. 同账号首次连接需要确认，确认后同账号再次连接自动通过

servers:
  - url: http://127.0.0.1:3000
    description: Local development

tags:
  - name: PC Connect Pair
    description: 同账号设备配对流程

security:
  - bearerAuth: []

paths:
  /pc/connect/pair/start:
    post:
      tags:
        - PC Connect Pair
      summary: 发起同账号设备配对
      description: |
        手机可以发起连接 PC，PC 也可以发起连接手机。
        同账号下首次发起配对时，接口会返回 `pending_confirmation`，需要用户确认。
        当该账号已经完成过一次同类设备配对确认后，再次发起会直接返回 `approved`。
      operationId: startPcConnectPair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PcConnectPairStartRequest'
            examples:
              mobileToPc:
                summary: 手机发起连接 PC
                value:
                  sourceDeviceType: mobile
                  sourceDeviceName: Mate 70
                  targetDeviceType: pc
                  targetDeviceName: Windows Dev
                  locationHint: Henan University Library
              pcToMobile:
                summary: PC 发起连接手机
                value:
                  sourceDeviceType: pc
                  sourceDeviceName: Windows Dev
                  targetDeviceType: mobile
                  targetDeviceName: Mate 70
      responses:
        '200':
          description: 发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcConnectPairStartResponse'
              examples:
                firstTime:
                  summary: 首次同账号连接，需确认
                  value:
                    code: 200
                    message: success
                    data:
                      pairCode: 6ef946e5d95d490284495e68d314c083
                      status: pending_confirmation
                      requiresConfirmation: true
                      trustedPreviously: false
                      sourceDeviceType: mobile
                      sourceDeviceName: Mate 70
                      targetDeviceType: pc
                      targetDeviceName: Windows Dev
                      locationHint: Henan University Library
                      confirmTip: same-account pair needs first confirmation
                trusted:
                  summary: 已确认过的同账号连接，直接通过
                  value:
                    code: 200
                    message: success
                    data:
                      pairCode: cee8feb126ba4e9eaa2bd39fec011734
                      status: approved
                      requiresConfirmation: false
                      trustedPreviously: true
                      sourceDeviceType: pc
                      sourceDeviceName: Windows Dev
                      targetDeviceType: mobile
                      targetDeviceName: Mate 70
                      locationHint: ''
                      confirmTip: same-account pair already trusted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  /pc/connect/pair/status:
    get:
      tags:
        - PC Connect Pair
      summary: 查询配对状态
      description: |
        前端可轮询该接口获取某次配对的状态，用于展示：
        - 待确认
        - 已通过
        - 已拒绝
      operationId: getPcConnectPairStatus
      parameters:
        - name: pairCode
          in: query
          required: true
          description: 配对码，由发起接口返回
          schema:
            type: string
            minLength: 1
          example: 6ef946e5d95d490284495e68d314c083
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcConnectPairStatusResponse'
              examples:
                pending:
                  summary: 等待首次确认
                  value:
                    code: 200
                    message: success
                    data:
                      pairCode: 6ef946e5d95d490284495e68d314c083
                      pairKey: mobile:pc
                      status: pending_confirmation
                      requiresConfirmation: true
                      trustedPreviously: false
                      initiator:
                        deviceType: mobile
                        deviceName: Mate 70
                      target:
                        deviceType: pc
                        deviceName: Windows Dev
                      locationHint: Henan University Library
                      createdAt: '2026-05-10 01:42:06'
                      handledAt: null
                approved:
                  summary: 已通过
                  value:
                    code: 200
                    message: success
                    data:
                      pairCode: cee8feb126ba4e9eaa2bd39fec011734
                      pairKey: mobile:pc
                      status: approved
                      requiresConfirmation: false
                      trustedPreviously: true
                      initiator:
                        deviceType: pc
                        deviceName: Windows Dev
                      target:
                        deviceType: mobile
                        deviceName: Mate 70
                      locationHint: ''
                      createdAt: '2026-05-10 01:42:07'
                      handledAt: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  /pc/connect/pair/confirm:
    post:
      tags:
        - PC Connect Pair
      summary: 首次同账号配对确认
      description: |
        仅当 `status = pending_confirmation` 时需要调用。
        调用成功后，系统会把该账号的同类设备组合记为“已信任”，后续再次配对将自动通过。
      operationId: confirmPcConnectPair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PcConnectPairConfirmRequest'
            examples:
              approve:
                summary: 同意连接
                value:
                  pairCode: 6ef946e5d95d490284495e68d314c083
                  action: approve
              reject:
                summary: 拒绝连接
                value:
                  pairCode: 6ef946e5d95d490284495e68d314c083
                  action: reject
      responses:
        '200':
          description: 处理成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PcConnectPairConfirmResponse'
              examples:
                approved:
                  summary: 已同意
                  value:
                    code: 200
                    message: success
                    data:
                      pairCode: 6ef946e5d95d490284495e68d314c083
                      action: approve
                      status: approved
                      requiresConfirmation: true
                      trustedPreviously: true
                      handledAt: '2026-05-10 01:42:07'
                rejected:
                  summary: 已拒绝
                  value:
                    code: 200
                    message: success
                    data:
                      pairCode: 6ef946e5d95d490284495e68d314c083
                      action: reject
                      status: rejected
                      requiresConfirmation: true
                      trustedPreviously: true
                      handledAt: '2026-05-10 01:45:18'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiEnvelopeStart:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/PcConnectPairStartData'

    ApiEnvelopeStatus:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/PcConnectPairStatusData'

    ApiEnvelopeConfirm:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/PcConnectPairConfirmData'

    ErrorEnvelope:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: integer
          example: 422
        message:
          type: string
          example: validation failed
        data:
          nullable: true
          oneOf:
            - type: object
              additionalProperties:
                type: string
            - type: 'null'

    DeviceSnapshot:
      type: object
      required:
        - deviceType
        - deviceName
      properties:
        deviceType:
          type: string
          enum: [mobile, pc]
          example: mobile
        deviceName:
          type: string
          example: Mate 70

    PcConnectPairStartRequest:
      type: object
      required:
        - sourceDeviceType
        - sourceDeviceName
        - targetDeviceType
      properties:
        sourceDeviceType:
          type: string
          enum: [mobile, pc]
          description: 发起连接的设备类型
        sourceDeviceName:
          type: string
          description: 发起连接的设备名称
          maxLength: 128
        targetDeviceType:
          type: string
          enum: [mobile, pc]
          description: 目标设备类型，必须与 sourceDeviceType 不同
        targetDeviceName:
          type: string
          nullable: true
          description: 目标设备名称，可选
          maxLength: 128
        locationHint:
          type: string
          nullable: true
          description: 场景说明或位置信息，可选
          maxLength: 128

    PcConnectPairStartData:
      type: object
      required:
        - pairCode
        - status
        - requiresConfirmation
        - trustedPreviously
        - sourceDeviceType
        - sourceDeviceName
        - targetDeviceType
        - targetDeviceName
        - locationHint
        - confirmTip
      properties:
        pairCode:
          type: string
          example: 6ef946e5d95d490284495e68d314c083
        status:
          type: string
          enum: [pending_confirmation, approved, rejected]
        requiresConfirmation:
          type: boolean
          example: true
        trustedPreviously:
          type: boolean
          example: false
        sourceDeviceType:
          type: string
          enum: [mobile, pc]
        sourceDeviceName:
          type: string
        targetDeviceType:
          type: string
          enum: [mobile, pc]
        targetDeviceName:
          type: string
        locationHint:
          type: string
        confirmTip:
          type: string
          description: 给前端展示的确认提示

    PcConnectPairStatusData:
      type: object
      required:
        - pairCode
        - pairKey
        - status
        - requiresConfirmation
        - trustedPreviously
        - initiator
        - target
        - locationHint
        - createdAt
      properties:
        pairCode:
          type: string
        pairKey:
          type: string
          example: mobile:pc
        status:
          type: string
          enum: [pending_confirmation, approved, rejected]
        requiresConfirmation:
          type: boolean
        trustedPreviously:
          type: boolean
        initiator:
          $ref: '#/components/schemas/DeviceSnapshot'
        target:
          $ref: '#/components/schemas/DeviceSnapshot'
        locationHint:
          type: string
        createdAt:
          type: string
          example: '2026-05-10 01:42:06'
        handledAt:
          type: string
          nullable: true
          example: '2026-05-10 01:42:07'

    PcConnectPairConfirmRequest:
      type: object
      required:
        - pairCode
        - action
      properties:
        pairCode:
          type: string
        action:
          type: string
          enum: [approve, reject]

    PcConnectPairConfirmData:
      type: object
      required:
        - pairCode
        - action
        - status
        - requiresConfirmation
        - trustedPreviously
        - handledAt
      properties:
        pairCode:
          type: string
        action:
          type: string
          enum: [approve, reject]
        status:
          type: string
          enum: [approved, rejected]
        requiresConfirmation:
          type: boolean
        trustedPreviously:
          type: boolean
        handledAt:
          type: string
          nullable: true

    PcConnectPairStartResponse:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelopeStart'

    PcConnectPairStatusResponse:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelopeStatus'

    PcConnectPairConfirmResponse:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelopeConfirm'

  responses:
    Unauthorized:
      description: 未登录或 Token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            code: 401
            message: unauthorized
            data: null

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            code: 404
            message: resource not found
            data: null

    ValidationFailed:
      description: 参数校验失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            code: 422
            message: validation failed
            data:
              sourceDeviceType: sourceDeviceType must be mobile or pc

    InternalError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            code: 500
            message: internal server error
            data: null
